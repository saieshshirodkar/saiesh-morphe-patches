name: App / Feature request
description: Request patches for a new app or a new feature.
title: "feat: "
labels: ["Feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Before creating a new request, please keep the following in mind:
        - **Do not submit a duplicate request**: Search for existing requests first.
  - type: input
    attributes:
      label: App name
      description: What app do you want patches for?
    validations:
      required: true
  - type: input
    attributes:
      label: Package name
      description: e.g. com.example.app
    validations:
      required: true
  - type: input
    attributes:
      label: App version
      description: Which version of the app do you use?
  - type: textarea
    attributes:
      label: What patches do you want?
      description: e.g. Remove ads, Unlock premium, etc.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I have checked all open and closed requests and this is not a duplicate.
          required: true
        - label: I have chosen an appropriate title.
          required: true
